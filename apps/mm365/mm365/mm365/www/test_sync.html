<!DOCTYPE html>
<html>
<head>
    <title>MM365 Sync Test</title>
    <script src="/assets/frappe/js/lib/jquery/jquery.min.js"></script>
    <script src="/assets/frappe/js/frappe-web.min.js"></script>
</head>
<body>
    <h1>MM365 Sync Test</h1>
    <button onclick="testSync()">Test MM365 Sync Function</button>
    <div id="result"></div>
    
    <script>
        function testSync() {
            frappe.call({
                method: "mm365.mm365.api.test_sync.test_sync_function",
                callback: function(r) {
                    document.getElementById('result').innerHTML = 
                        '<h3>Result: ' + r.message + '</h3>';
                }
            });
        }
    </script>
</body>
</html>
